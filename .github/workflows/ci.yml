name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and development tools
        run: make install-dev PYTHON=python

      - name: Run CI checks
        run: make ci PYTHON=python

      - name: Run benchmark smoke
        run: python test/benchmark.py --limit 2 --profile-slowest 3 --profile-buckets
